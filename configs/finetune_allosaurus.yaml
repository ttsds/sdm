# sdm-allosaurus: distill Allosaurus phones-per-second per chunk.
# Allosaurus has no TPU implementation; targets are pre-extracted offline
# (scripts/extract_offline_targets.py) and read from gs:// shards.

experiment: sdm-allosaurus

backbone:
  model_id: utter-project/mHuBERT-147
  hidden_size: 768
  layer_idx: -1

teacher:
  kind: allosaurus_offline
  in_loop: false
  cache_dir: gs://sdm-cache/teacher_cache/allosaurus
  target_dim: 1
  pooled: chunked                # phone count / chunk_seconds per chunk

data:
  repo_id: amphion/Emilia-Dataset
  split: train
  streaming: true
  shuffle_buffer: 10000
  seed: 0
  fraction: 0.1
  sample_rate: 16000
  chunk_seconds: 1.0
  max_chunks: 32

train:
  batch_size: 32
  grad_accum: 1
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  total_steps: 15000
  log_every: 50
  ckpt_every: 2500
  ckpt_dir: gs://sdm-ckpts/sdm-allosaurus
  resume_from_latest: true
  fsdp: true
  seed: 0
  wandb:
    enabled: true
    project: sdm
    run_name: sdm-allosaurus-10pct
    tags: [finetune, multilingual, 10pct, v6e-8, prosody]
