# sdm-dvector: distill d-Vector windowed embeddings.
# d-Vector ships as a torchscript checkpoint; runs on TPU once traced.

experiment: sdm-dvector

backbone:
  model_id: utter-project/mHuBERT-147
  hidden_size: 768
  layer_idx: -1

teacher:
  kind: dvector_torchscript
  model_id: ttsds/dvector       # Wav2Mel + dvector.pt baked into the ttsds package
  in_loop: true
  cache_dir: null
  target_dim: 256
  pooled: chunked
  window_seconds: 1.0           # matches the 1s chunk; one teacher embedding per chunk

data:
  repo_id: amphion/Emilia-Dataset
  split: train
  streaming: true
  shuffle_buffer: 10000
  seed: 0
  fraction: 0.1
  sample_rate: 16000
  chunk_seconds: 1.0
  max_chunks: 32

train:
  batch_size: 16
  grad_accum: 1
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  total_steps: 30000
  log_every: 50
  ckpt_every: 5000
  ckpt_dir: gs://sdm-ckpts/sdm-dvector
  resume_from_latest: true
  fsdp: false
  seed: 0
  wandb:
    enabled: true
    project: sdm
    run_name: sdm-dvector-10pct
    tags: [finetune, multilingual, 10pct, v6e-8, speaker]
