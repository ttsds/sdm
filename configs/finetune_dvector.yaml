# sdm-dvector: distill d-Vector windowed embeddings into XLS-R 300M.
# d-Vector ships as a torchscript checkpoint; runs on TPU once traced.
# TODO: implement sdm/data/teachers/dvector_torchscript.py and register the
# `dvector_torchscript` kind in sdm/data/teachers/__init__.py.

experiment: sdm-dvector

backbone:
  kind: fairseq_w2v2
  model_id: facebook/wav2vec2-xls-r-300m
  hidden_size: 1024
  layer_idx: -1

teacher:
  kind: dvector_torchscript
  model_id: yistLin/dvector       # GitHub release v1.1.1 — wav2mel.pt + dvector-step250000.pt
  in_loop: true
  cache_dir: null
  target_dim: 256
  pooled: chunked
  target_layernorm: true

data:
  repo_id: amphion/Emilia-Dataset
  split: train
  streaming: true
  shuffle_buffer: 10000
  seed: 0
  fraction: 0.1
  sample_rate: 16000
  chunk_seconds: 1.0
  max_chunks: 32

train:
  batch_size: 16
  grad_accum: 1
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  total_steps: 10000
  log_every: 50
  ckpt_every: 2000
  ckpt_dir: gs://sdm-ckpts/sdm-dvector
  resume_from_latest: true
  fsdp: false
  seed: 0
  wandb:
    enabled: true
    project: sdm
    run_name: sdm-dvector-10pct
    tags: [finetune, multilingual, 10pct, v6e-8, speaker]
