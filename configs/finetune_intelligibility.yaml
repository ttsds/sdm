# Intelligibility-factor finetune: distill Whisper-small.en encoder mean-pooled.
# Add wav2vec2-base-960h and XLSR-53 once those teachers are ported into
# sdm/data/teacher_cache.py.

model:
  fsq_vocab_size: 65536
  hidden_size: 768
  num_hidden_layers: 12
  num_attention_heads: 12
  intermediate_size: 3072
  max_position_embeddings: 2048
  position_buckets: 256

data:
  repo_id: neuphonic/emilia-yodas-english-neucodec
  split: train
  max_length: 2048
  min_codes: 16

heads:
  - { name: whisper, target_dim: 768, pooled: true }

train:
  cache_dir: gs://sdm-cache-euw4/teacher_cache/intelligibility
  pretrained_ckpt: gs://sdm-ckpts/pretrain_base/final.pt
  layer_idx: -1
  batch_size: 16
  grad_accum: 1
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 500
  total_steps: 25000
  log_every: 50
  ckpt_every: 2500
  ckpt_dir: gs://sdm-ckpts/finetune_intelligibility
  resume_from_latest: true
  seed: 0
  wandb:
    enabled: true
    project: sdm
    run_name: finetune_intelligibility
    tags: [finetune, intelligibility]
