# sdm-mpm: distill Masked Prosody Model layer 7. English-only teacher; we
# accept the language bias when training on the multilingual stream.
# MPM expects 22050 Hz audio -- handled inside the teacher wrapper.

experiment: sdm-mpm

backbone:
  model_id: utter-project/mHuBERT-147
  hidden_size: 768
  layer_idx: -1

teacher:
  kind: mpm
  model_id: cdminix/masked_prosody_model
  layer: 7
  in_loop: true
  cache_dir: null
  target_dim: 256                # confirm against MPM hidden size at first run
  pooled: chunked                # mean-pool MPM frames within each 1s chunk

data:
  repo_id: amphion/Emilia-Dataset
  split: train
  streaming: true
  shuffle_buffer: 10000
  seed: 0
  fraction: 0.1
  sample_rate: 16000
  chunk_seconds: 1.0
  max_chunks: 32

train:
  batch_size: 16
  grad_accum: 1
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  total_steps: 30000
  log_every: 50
  ckpt_every: 5000
  ckpt_dir: gs://sdm-ckpts/sdm-mpm
  resume_from_latest: true
  fsdp: false
  seed: 0
  wandb:
    enabled: true
    project: sdm
    run_name: sdm-mpm-10pct
    tags: [finetune, multilingual, 10pct, v6e-8, prosody, english-bias]
