# sdm-mpm: distill Masked Prosody Model layer 7 into XLS-R 300M. English-only
# teacher; we accept the language bias when training on the multilingual stream.
# MPM expects 22050 Hz audio -- handled inside the teacher wrapper.
# MPM is here: https://huggingface.co/cdminix/masked_prosody_model
# TODO: implement sdm/data/teachers/mpm.py and register the `mpm` kind in
# sdm/data/teachers/__init__.py.

experiment: sdm-mpm-wristband
backbone:
  kind: fairseq_w2v2
  model_id: facebook/wav2vec2-xls-r-300m
  hidden_size: 1024
  layer_idx: -1

teacher:
  kind: mpm
  model_id: cdminix/masked_prosody_model
  layer: 7
  in_loop: true
  cache_dir: null
  target_dim: 256                # MPM filter_size (Conformer hidden dim)
  pooled: chunked                # mean-pool MPM frames within each 1s chunk
  target_layernorm: true
  sample_rate: 16000
  teacher_sample_rate: 22050
  chunk_seconds: 1.0

data:
  repo_id: amphion/Emilia-Dataset
  split: train
  streaming: true
  shuffle_buffer: 10000
  seed: 0
  fraction: 0.1
  sample_rate: 16000
  chunk_seconds: 1.0
  max_chunks: 32

train:
  batch_size: 4
  grad_accum: 4
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  total_steps: 10000
  log_every: 50
  ckpt_every: 2000
  ckpt_dir: gs://sdm-ckpts/sdm-mpm-wristband
  resume_from_latest: true
  eval_every: 5000
  eval_utterances: 64
  fsdp: false
  seed: 0
  wandb:
    enabled: true
    project: sdm
    run_name: sdm-mpm-wristband-10pct
    tags: [finetune, multilingual, 10pct, v6e-8, prosody, english-bias, wristband]

regularizer:
  enabled: true
  weight: 0.1
  beta: 8.0
  lambda_rad: 0.1
  lambda_mom: 1.0
  moment: kl_diag
  calibrate: false
