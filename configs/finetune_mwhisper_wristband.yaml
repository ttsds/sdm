# sdm-mwhisper: distill multilingual Whisper-small encoder (per-chunk mean) into XLS-R 300M.
# Note: deviates from TTSDS's 1500-d cross-layer-and-hidden-mean trick; we use
# the conventional encoder hidden states pooled per chunk.
# TODO: implement sdm/data/teachers/whisper_encoder.py and register the
# `whisper_encoder` kind in sdm/data/teachers/__init__.py.

experiment: sdm-mwhisper-wristband
backbone:
  kind: fairseq_w2v2
  model_id: facebook/wav2vec2-xls-r-300m
  hidden_size: 1024
  layer_idx: -1

teacher:
  kind: whisper_encoder
  model_id: openai/whisper-small
  in_loop: true
  cache_dir: null
  target_dim: 768                # Whisper-small encoder hidden size
  pooled: chunked
  target_layernorm: true
  chunk_seconds: 1.0
  sample_rate: 16000

data:
  repo_id: amphion/Emilia-Dataset
  split: train
  streaming: true
  shuffle_buffer: 10000
  seed: 0
  fraction: 0.1
  sample_rate: 16000
  chunk_seconds: 1.0
  max_chunks: 32

train:
  batch_size: 4                  # Whisper encoder is heavier than student
  grad_accum: 4
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  total_steps: 10000
  log_every: 50
  ckpt_every: 2000
  ckpt_dir: gs://sdm-ckpts/sdm-mwhisper-wristband
  resume_from_latest: true
  eval_every: 5000
  eval_utterances: 64
  fsdp: false
  seed: 0
  wandb:
    enabled: true
    project: sdm
    run_name: sdm-mwhisper-wristband-10pct
    tags: [finetune, multilingual, 10pct, v6e-8, intelligibility, wristband]

regularizer:
  enabled: true
  weight: 0.1
  beta: 8.0
  lambda_rad: 0.1
  lambda_mom: 1.0
  moment: w2
  calibrate: false
