# sdm-speaking-rate: distill per-chunk syllables-per-second derived from
# the audio via Allosaurus. Each 1-second chunk gets its own scalar based
# on the IPA phones whose start timestamps fall inside the chunk; vowel
# groups (collapsed diphthongs) are the syllable-nucleus count, then
# divided by chunk_seconds to give a rate. Replaces the earlier transcript
# G2P teacher (which broadcast a single utterance-level rate across all
# chunks) so the student must learn local prosody, not a constant.

experiment: sdm-speaking-rate-wristband
backbone:
  kind: fairseq_w2v2
  model_id: facebook/wav2vec2-xls-r-300m
  hidden_size: 1024
  layer_idx: -1

teacher:
  kind: allosaurus_speaking_rate
  in_loop: true                   # CPU compute (RTF~0.02), runs alongside the step
  cache_dir: null
  target_dim: 1
  pooled: chunked                 # one rate per chunk
  target_layernorm: false         # 1-D scalar; LN would zero it out
  loss: l1                        # scalar target: cosine is degenerate, use plain L1
  # Linear normalisation so L1 starts at ~O(1).
  # Typical syllable rate ~4 syl/sec, std ~1.5.
  target_mean: 4.0
  target_scale: 1.5
  chunk_seconds: 1.0
  sample_rate: 16000
  default_language: en
  allosaurus_model: latest
  emit: 1.0

data:
  repo_id: amphion/Emilia-Dataset
  split: train
  streaming: true
  shuffle_buffer: 10000
  seed: 0
  fraction: 0.1
  sample_rate: 16000
  chunk_seconds: 1.0
  max_chunks: 32
  num_workers: 4                  # phonemizer runs in worker procs

train:
  batch_size: 4
  grad_accum: 4
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  total_steps: 10000
  log_every: 50
  ckpt_every: 2000
  ckpt_dir: gs://sdm-ckpts/sdm-speaking-rate-wristband
  resume_from_latest: true
  eval_every: 5000
  eval_utterances: 64
  fsdp: false
  seed: 0
  wandb:
    enabled: true
    project: sdm
    run_name: sdm-speaking-rate-wristband-10pct
    tags: [finetune, multilingual, 10pct, v6e-8, prosody, wristband]

regularizer:
  enabled: true
  weight: 0.1
  beta: 8.0
  lambda_rad: 0.1
  lambda_mom: 1.0
  moment: kl_diag
  calibrate: false
