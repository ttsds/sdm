# sdm-w2v2-asr: distill wav2vec2-large-xlsr-53 ASR encoder (per-chunk mean) into XLS-R 300M.
# Note: deviates from TTSDS's per-utterance mean -- we re-extract per chunk so
# distance comparisons over the dataset are uniform across all 8 experiments.
# TODO: implement sdm/data/teachers/hf_ctc.py and register the `hf_ctc` kind in
# sdm/data/teachers/__init__.py.

experiment: sdm-w2v2-asr-wristband
backbone:
  kind: fairseq_w2v2
  model_id: facebook/wav2vec2-xls-r-300m
  hidden_size: 1024
  layer_idx: -1

teacher:
  kind: hf_ctc
  model_id: jonatasgrosman/wav2vec2-large-xlsr-53-english   # multilingual ASR ckpt; swap if a better cross-lingual one is preferred
  layer: -1                       # last encoder hidden state
  in_loop: true
  cache_dir: null
  target_dim: 1024
  pooled: chunked
  target_layernorm: true

data:
  repo_id: amphion/Emilia-Dataset
  split: train
  streaming: true
  shuffle_buffer: 10000
  seed: 0
  fraction: 0.1
  sample_rate: 16000
  chunk_seconds: 1.0
  max_chunks: 32

train:
  batch_size: 4
  grad_accum: 4
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  total_steps: 10000
  log_every: 50
  ckpt_every: 2000
  ckpt_dir: gs://sdm-ckpts/sdm-w2v2-asr-wristband
  resume_from_latest: true
  eval_every: 5000
  eval_utterances: 64
  fsdp: false
  seed: 0
  wandb:
    enabled: true
    project: sdm
    run_name: sdm-w2v2-asr-wristband-10pct
    tags: [finetune, multilingual, 10pct, v6e-8, intelligibility, wristband]

regularizer:
  enabled: true
  weight: 0.1
  beta: 8.0
  lambda_rad: 0.1
  lambda_mom: 1.0
  moment: w2
  calibrate: false
