# sdm-wespeaker: distill WeSpeaker windowed embeddings into XLS-R 300M.
# Native pyannote.audio.Inference is CPU-bound; we wrap the underlying ResNet34
# directly so it runs on TPU.
# TODO: implement sdm/data/teachers/wespeaker.py and register the
# `wespeaker_resnet34` kind in sdm/data/teachers/__init__.py.

experiment: sdm-wespeaker

backbone:
  kind: fairseq_w2v2
  model_id: facebook/wav2vec2-xls-r-300m
  hidden_size: 1024
  layer_idx: -1

teacher:
  kind: wespeaker_resnet34
  model_id: pyannote/wespeaker-voxceleb-resnet34-LM
  in_loop: true
  cache_dir: null
  target_dim: 256
  pooled: chunked
  target_layernorm: true

data:
  repo_id: amphion/Emilia-Dataset
  split: train
  streaming: true
  shuffle_buffer: 10000
  seed: 0
  fraction: 0.1
  sample_rate: 16000
  chunk_seconds: 1.0
  max_chunks: 32

train:
  batch_size: 16
  grad_accum: 1
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  total_steps: 10000
  log_every: 50
  ckpt_every: 2000
  ckpt_dir: gs://sdm-ckpts/sdm-wespeaker
  resume_from_latest: true
  fsdp: false
  seed: 0
  wandb:
    enabled: true
    project: sdm
    run_name: sdm-wespeaker-10pct
    tags: [finetune, multilingual, 10pct, v6e-8, speaker]
