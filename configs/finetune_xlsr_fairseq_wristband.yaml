# sdm-xlsr-fairseq: distill XLS-R 300M (fairseq port) student against
# mHuBERT-147 layer 8 (HF teacher). Same data + loss as finetune_xlsr.yaml,
# but the student uses our in-tree fairseq port (Fp32GroupNorm /
# Fp32LayerNorm, baked-out positional weight_norm) so the encoder behaves
# correctly under bf16 XLA.

experiment: sdm-xlsr-fairseq-wristband
backbone:
  kind: fairseq_w2v2
  model_id: facebook/wav2vec2-xls-r-300m
  hidden_size: 1024
  layer_idx: -1

teacher:
  kind: hf_ssl
  model_id: utter-project/mHuBERT-147
  layer: 8
  in_loop: true
  cache_dir: null
  target_dim: 768
  pooled: chunked
  target_layernorm: true

data:
  repo_id: amphion/Emilia-Dataset
  split: train
  streaming: true
  shuffle_buffer: 10000
  seed: 0
  fraction: 0.1
  sample_rate: 16000
  chunk_seconds: 1.0
  max_chunks: 32

train:
  batch_size: 4
  grad_accum: 4
  lr: 5.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  total_steps: 10000
  log_every: 50
  ckpt_every: 2000
  ckpt_dir: gs://sdm-ckpts/sdm-xlsr-fairseq-wristband
  resume_from_latest: true
  eval_every: 5000
  eval_utterances: 64
  fsdp: false
  seed: 0
  wandb:
    enabled: true
    project: sdm
    run_name: sdm-xlsr-fairseq-wristband-10pct
    tags: [finetune, multilingual, 10pct, v6e-8, xlsr-fairseq, wristband]

regularizer:
  enabled: true
  weight: 0.1
  beta: 8.0
  lambda_rad: 0.1
  lambda_mom: 1.0
  moment: w2
  calibrate: false
